version: '3.8'

services:
  web:
    build:
      context: ./web
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    container_name: videoops-web
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: videoops-db
    environment:
      POSTGRES_DB: videoops
      POSTGRES_USER: videoops
      POSTGRES_PASSWORD: videoops
    ports:
      - "5432:5432"
    volumes:
      - videoops-db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  videoops-db-data:

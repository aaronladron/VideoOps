name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify game structure
        run: npm run check:games
        continue-on-error: true
      
      - name: Run tests
        id: tests
        continue-on-error: true
        run: npm test -- --reporter=verbose

      - name: Linting code
        id: lint
        continue-on-error: true
        run: npm run lint
      
      - name: Security audit
        id: audit
        continue-on-error: true
        run: npm audit --audit-level=moderate
      
      - name: Test Results Summary
        if: always()
        run: |
          echo "## 🧪 Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Execution Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests**: ${{ steps.tests.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Linting**: ${{ steps.lint.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Audit**: ${{ steps.audit.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Details" >> $GITHUB_STEP_SUMMARY
          echo "- **SpaceWord**: 10 unit tests + 3 functional tests" >> $GITHUB_STEP_SUMMARY
          echo "- **Keep White Space**: 10 unit tests + 3 functional tests" >> $GITHUB_STEP_SUMMARY
          echo "- **Linter**: Google JavaScript Style Guide" >> $GITHUB_STEP_SUMMARY
          echo "- **Audit Level**: Moderate (CVEs high & critical)" >> $GITHUB_STEP_SUMMARY
      
      - name: Fail if critical services failed
        if: failure() && (steps.tests.outcome == 'failure' || steps.lint.outcome == 'failure')
        run: |
          echo "::error::CI Pipeline failed - please check tests and linting"
          exit 1

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Docker image
        id: docker_build
        run: docker build -t videogames:latest .
      
      - name: Test Docker image
        run: |
          docker run --rm -d --name test-container -p 8080:8080 videogames:latest
          sleep 2
          curl -f http://localhost:8080 || exit 1
          docker stop test-container
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
      
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "✓ Docker image built successfully" >> $GITHUB_STEP_SUMMARY
          echo "✓ Image validated" >> $GITHUB_STEP_SUMMARY
          echo "✓ GitHub Pages deployment activated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Image**: videogames:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Web Server**: http-server on port 8080" >> $GITHUB_STEP_SUMMARY



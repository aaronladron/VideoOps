name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify game structure
        run: npm run check:games
        continue-on-error: true
      
      - name: Run tests
        id: tests
        continue-on-error: true
        run: npm test -- --reporter=verbose

      - name: Linting code
        id: lint
        continue-on-error: true
        run: npm run lint
      
      - name: Security audit
        id: audit
        continue-on-error: true
        run: npm audit --audit-level=moderate
      
      - name: Test Results Summary
        if: always()
        run: |
          echo "## 🧪 Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Execution Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests**: ${{ steps.tests.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Linting**: ${{ steps.lint.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Audit**: ${{ steps.audit.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Details" >> $GITHUB_STEP_SUMMARY
          echo "- **SpaceWord**: 10 unit tests + 3 functional tests" >> $GITHUB_STEP_SUMMARY
          echo "- **Keep White Space**: 10 unit tests + 3 functional tests" >> $GITHUB_STEP_SUMMARY
          echo "- **Linter**: Google JavaScript Style Guide" >> $GITHUB_STEP_SUMMARY
          echo "- **Audit Level**: Moderate (CVEs high & critical)" >> $GITHUB_STEP_SUMMARY
      
      - name: Fail if critical services failed
        if: failure() && (steps.tests.outcome == 'failure' || steps.lint.outcome == 'failure')
        run: |
          echo "::error::CI Pipeline failed - please check tests and linting"
          exit 1

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "✓ GitHub Pages deployment activated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: main" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: GitHub Pages (official deploy-pages action)" >> $GITHUB_STEP_SUMMARY


